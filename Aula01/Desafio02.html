<body>
    <h1>Desafio 2</h1>
    <hr>
    <p id="n1">Numero 1</p>
    <p id="sinal">Operação</p>
    <p id="n2">Numero 2</p>
    <p id="resposta">Resultado</p>
    <script>
        let num1 = window.prompt("Digite o primeiro número: ")
        num1 = parseFloat(num1)
        let num2 = window.prompt("Digite o segundo número: ")
        num2 = parseFloat(num2)
        let operacao = window.prompt("Digite a operação (+) ou (-)")
        let resultado = 0;
        console.log(num1, operacao, num2)
        if (operacao == "+") {
            resultado = num1 + num2
            window.alert(resultado)
            console.log(resultado)

            document.getElementById("n1").innerText = num1
            document.getElementById("sinal").innerText = operacao
            document.getElementById("n2").innerText = num2
            document.getElementById("resposta").innerText = resultado
        }
        else if (operacao == "-") {
            resultado = num1 - num2
            window.alert(resultado)
            console.log(resultado)

            document.getElementById("n1").innerText = num1
            document.getElementById("sinal").innerText = operacao
            document.getElementById("n2").innerText = num2
            document.getElementById("resposta").innerText = resultado
        }
        else {
            window.alert("Operação inválida!")
        }

    </script>
</body>
